name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: make fmt && make fmt-check

      - name: Run tests
        run: make test

      - name: Build release binary
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          SHORT_COMMIT="${COMMIT::7}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          make build VERSION="$VERSION" COMMIT="$SHORT_COMMIT" BUILD_TIME="$BUILD_TIME"
          go build -o bin/simsexam-migrate ./cmd/migrate
          go build -o bin/simsexam-bootstrapv1 ./cmd/bootstrapv1

      - name: Package release artifact
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PACKAGE_ROOT="dist/simsexam-${VERSION}-linux-amd64"
          mkdir -p "$PACKAGE_ROOT"
          cp bin/simsexam "$PACKAGE_ROOT/simsexam"
          cp bin/simsexam-migrate "$PACKAGE_ROOT/simsexam-migrate"
          cp bin/simsexam-bootstrapv1 "$PACKAGE_ROOT/simsexam-bootstrapv1"
          cp deploy/systemd/simsexam.service "$PACKAGE_ROOT/simsexam.service.template"
          cp deploy/config/simsexam.env.example "$PACKAGE_ROOT/simsexam.env.example"
          cp -R templates "$PACKAGE_ROOT/templates"
          cp -R static "$PACKAGE_ROOT/static"
          tar -C dist -czf "dist/simsexam-${VERSION}-linux-amd64.tar.gz" "simsexam-${VERSION}-linux-amd64"
          sha256sum "dist/simsexam-${VERSION}-linux-amd64.tar.gz" > "dist/simsexam-${VERSION}-SHA256SUMS.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/simsexam-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/simsexam-${{ github.ref_name }}-SHA256SUMS.txt
          generate_release_notes: true
