name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: make fmt && make fmt-check

      - name: Run tests
        run: make test

      - name: Build release binary
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          SHORT_COMMIT="${COMMIT::7}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          make build VERSION="$VERSION" COMMIT="$SHORT_COMMIT" BUILD_TIME="$BUILD_TIME"

      - name: Package release artifact
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist/package
          cp bin/simsexam dist/package/simsexam
          tar -C dist/package -czf "dist/simsexam-${VERSION}-linux-amd64.tar.gz" simsexam
          sha256sum "dist/simsexam-${VERSION}-linux-amd64.tar.gz" > "dist/simsexam-${VERSION}-SHA256SUMS.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/simsexam-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/simsexam-${{ github.ref_name }}-SHA256SUMS.txt
          generate_release_notes: true
