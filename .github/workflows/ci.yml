name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: make fmt && make fmt-check

      - name: Run tests
        run: make test

      - name: Build
        env:
          COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          SHORT_COMMIT="${COMMIT::7}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          make build VERSION="ci-${SHORT_COMMIT}" COMMIT="$SHORT_COMMIT" BUILD_TIME="$BUILD_TIME"
          go build -o bin/simsexam-migrate ./cmd/migrate
          go build -o bin/simsexam-bootstrapv1 ./cmd/bootstrapv1

      - name: Package commit artifact
        env:
          COMMIT: ${{ env.COMMIT_SHA }}
        run: |
          SHORT_COMMIT="${COMMIT::7}"
          mkdir -p dist
          PACKAGE_ROOT="dist/simsexam-commit-${SHORT_COMMIT}-linux-amd64"
          mkdir -p "$PACKAGE_ROOT"
          cp bin/simsexam "$PACKAGE_ROOT/simsexam"
          cp bin/simsexam-migrate "$PACKAGE_ROOT/simsexam-migrate"
          cp bin/simsexam-bootstrapv1 "$PACKAGE_ROOT/simsexam-bootstrapv1"
          cp deploy/systemd/simsexam.service "$PACKAGE_ROOT/simsexam.service.template"
          cp deploy/config/simsexam.env.example "$PACKAGE_ROOT/simsexam.env.example"
          cp -R templates "$PACKAGE_ROOT/templates"
          cp -R static "$PACKAGE_ROOT/static"
          tar -C dist -czf "dist/simsexam-commit-${SHORT_COMMIT}-linux-amd64.tar.gz" "simsexam-commit-${SHORT_COMMIT}-linux-amd64"
          sha256sum "dist/simsexam-commit-${SHORT_COMMIT}-linux-amd64.tar.gz" > "dist/simsexam-commit-${SHORT_COMMIT}-SHA256SUMS.txt"

      - name: Upload commit artifact
        uses: actions/upload-artifact@v4
        with:
          name: simsexam-commit-${{ env.COMMIT_SHA }}
          path: |
            dist/simsexam-commit-*-linux-amd64.tar.gz
            dist/simsexam-commit-*-SHA256SUMS.txt
          if-no-files-found: error
