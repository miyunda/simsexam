name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: make fmt && make fmt-check

      - name: Run tests
        run: make test

      - name: Build
        run: make build
